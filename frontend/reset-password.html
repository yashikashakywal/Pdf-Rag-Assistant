<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Marginalia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-screen">
  <div class="auth-card">
    <div class="brand auth-brand">
      <span class="brand-mark">§</span>
      <div>
        <h1>Marginalia</h1>
        <p>Ask your PDFs anything</p>
      </div>
    </div>

    <h2 class="auth-heading">Choose a new password</h2>

    <form class="auth-form" id="resetForm">
      <label class="auth-label" for="newPassword">New password</label>
      <input class="auth-input" type="password" id="newPassword" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required>

      <label class="auth-label" for="confirmPassword">Confirm new password</label>
      <input class="auth-input" type="password" id="confirmPassword" placeholder="Re-enter your new password" autocomplete="new-password" minlength="8" required>

      <p class="auth-error" id="authError" hidden></p>
      <p class="auth-success" id="authSuccess" hidden></p>

      <button class="auth-submit" type="submit" id="authSubmit">Reset password</button>
    </form>

    <p class="auth-switch"><a href="login.html">Back to sign in</a></p>
  </div>
</div>

<script>
const API = window.API_BASE_URL || "/api";

const els = {
  form: document.getElementById("resetForm"),
  newPassword: document.getElementById("newPassword"),
  confirmPassword: document.getElementById("confirmPassword"),
  error: document.getElementById("authError"),
  success: document.getElementById("authSuccess"),
  submit: document.getElementById("authSubmit"),
};

const token = new URLSearchParams(window.location.search).get("token");

if (!token) {
  els.error.textContent = "This reset link is missing its token. Please request a new one from the sign-in page.";
  els.error.hidden = false;
  els.form.hidden = true;
}

els.form.addEventListener("submit", async (e) => {
  e.preventDefault();
  els.error.hidden = true;
  els.success.hidden = true;

  if (els.newPassword.value !== els.confirmPassword.value) {
    els.error.textContent = "Passwords don't match.";
    els.error.hidden = false;
    return;
  }

  els.submit.disabled = true;

  try {
    const res = await fetch(`${API}/auth/reset-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, new_password: els.newPassword.value }),
    });
    const data = await res.json();

    if (!res.ok) {
      els.error.textContent = data.detail || "Something went wrong. Please try again.";
      els.error.hidden = false;
      return;
    }

    els.success.textContent = `${data.message} Redirecting to sign in…`;
    els.success.hidden = false;
    els.form.hidden = true;
    setTimeout(() => (window.location.href = "login.html"), 2000);
  } catch {
    els.error.textContent = "Couldn't reach the backend. Is the server running?";
    els.error.hidden = false;
  } finally {
    els.submit.disabled = false;
  }
});
</script>
</body>
</html>
