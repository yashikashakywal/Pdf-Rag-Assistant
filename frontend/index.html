<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Research Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="appRoot" hidden>

  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">§</span>
      <div>
        <h1>Marginalia</h1>
        <p>Ask your PDFs anything</p>
      </div>
    </div>

    <div class="account-row" id="accountRow">
      <span class="account-email" id="accountEmail"></span>
      <button class="logout-btn" id="logoutBtn">Sign out</button>
    </div>

    <div class="status-row" id="statusRow">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Checking backend…</span>
    </div>

    <label class="dropzone" id="dropzone" for="pdfFile">
      <input type="file" id="pdfFile" accept=".pdf" multiple hidden>
      <span class="dropzone-icon">＋</span>
      <span class="dropzone-label">Drop PDFs here or click to browse</span>
    </label>

    <div class="upload-progress" id="uploadProgress" hidden>
      <div class="upload-progress-bar"><div class="upload-progress-fill" id="uploadFill"></div></div>
      <span id="uploadStatus">Indexing…</span>
    </div>

    <h2 class="section-label">Indexed documents <span id="docCount">(0)</span></h2>
    <ul class="file-list" id="fileList">
      <li class="empty-state">No documents yet. Upload a PDF to begin.</li>
    </ul>

    <button class="reset-btn" id="resetBtn">Clear all documents</button>
  </aside>

  <main class="chat-panel">
    <header class="chat-header">
      <h2>Reading room</h2>
      <p>Answers are grounded only in what you've uploaded — with page citations.</p>
    </header>

    <div class="chat-box" id="chatBox">
      <div class="chat-empty" id="chatEmpty">
        <p class="chat-empty-mark">¶</p>
        <p>Upload a document on the left, then ask a question about it.</p>
      </div>
    </div>

    <form class="input-area" id="askForm">
      <input type="text" id="question" placeholder="Ask something about your documents…" autocomplete="off">
      <button type="submit" id="askBtn">Ask</button>
    </form>
  </main>

</div>

<script src="auth-common.js"></script>
<script src="script.js"></script>
</body>
</html>
