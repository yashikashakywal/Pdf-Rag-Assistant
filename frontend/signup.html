<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Marginalia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="brand auth-brand">
      <span class="brand-mark">§</span>
      <div>
        <h1>Marginalia</h1>
        <p>Ask your PDFs anything</p>
      </div>
    </div>

    <form class="auth-form" id="authForm">
      <label class="auth-label" for="authEmail">Email</label>
      <input class="auth-input" type="email" id="authEmail" placeholder="you@example.com" autocomplete="email" required>

      <label class="auth-label" for="authPassword">Password</label>
      <input class="auth-input" type="password" id="authPassword" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required>

      <p class="auth-error" id="authError" hidden></p>

      <button class="auth-submit" type="submit" id="authSubmit">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</div>

<script src="auth-common.js"></script>
<script src="signup.js"></script>
</body>
</html>
