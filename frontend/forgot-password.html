<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot password — Marginalia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-screen">
  <div class="auth-card">
    <div class="brand auth-brand">
      <span class="brand-mark">§</span>
      <div>
        <h1>Marginalia</h1>
        <p>Ask your PDFs anything</p>
      </div>
    </div>

    <h2 class="auth-heading">Reset your password</h2>
    <p class="auth-hint" id="formHint">Enter your email and we'll send you a link to reset your password.</p>

    <form class="auth-form" id="forgotForm">
      <label class="auth-label" for="authEmail">Email</label>
      <input class="auth-input" type="email" id="authEmail" placeholder="you@example.com" autocomplete="email" required>

      <p class="auth-error" id="authError" hidden></p>
      <p class="auth-success" id="authSuccess" hidden></p>

      <button class="auth-submit" type="submit" id="authSubmit">Send reset link</button>
    </form>

    <p class="auth-switch"><a href="login.html">Back to sign in</a></p>
  </div>
</div>

<script>
const API = window.API_BASE_URL || "/api";

const els = {
  form: document.getElementById("forgotForm"),
  email: document.getElementById("authEmail"),
  error: document.getElementById("authError"),
  success: document.getElementById("authSuccess"),
  submit: document.getElementById("authSubmit"),
  hint: document.getElementById("formHint"),
};

els.form.addEventListener("submit", async (e) => {
  e.preventDefault();
  els.error.hidden = true;
  els.success.hidden = true;
  els.submit.disabled = true;

  try {
    const res = await fetch(`${API}/auth/forgot-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: els.email.value.trim() }),
    });
    const data = await res.json();

    if (!res.ok) {
      els.error.textContent = data.detail || "Something went wrong. Please try again.";
      els.error.hidden = false;
      return;
    }

    els.success.textContent = data.message;
    els.success.hidden = false;
    els.hint.hidden = true;
    els.form.hidden = true;
  } catch {
    els.error.textContent = "Couldn't reach the backend. Is the server running?";
    els.error.hidden = false;
  } finally {
    els.submit.disabled = false;
  }
});
</script>
</body>
</html>
