services:
  - type: web
    name: pdf-rag-assistant
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CHUNK_SIZE
        value: "800"
      - key: CHUNK_OVERLAP
        value: "150"
      - key: RETRIEVAL_K
        value: "3"
      - key: UPLOAD_DIR
        value: app/data/uploads
      - key: FAISS_INDEX_DIR
        value: app/data/faiss_index
      - key: ALLOWED_ORIGINS
        value: http://localhost:5500,http://127.0.0.1:5500
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: DATABASE_URL
        value: sqlite:///./app/data/app.db
      - key: PYTHON_VERSION
        value: 3.11.10
